name: flutter_ai_assistant
description: >-
  Drop-in AI assistant for Flutter apps. Reads UI via Semantics tree, executes
  multi-step tasks autonomously, and supports Gemini (Firebase AI Logic),
  Claude, and OpenAI.
version: 0.2.0
repository: https://github.com/myrickshaw/flutter_ai_assistant

topics:
  - ai
  - assistant
  - agent
  - voice
  - llm

environment:
  sdk: ^3.8.1
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # LLM Providers
  # Recommended: firebase_ai (Firebase AI Logic) — App Check support,
  # implicit prompt caching on Gemini 2.5+, no raw API key in the binary.
  firebase_core: ^4.3.0
  firebase_ai: ^3.11.0
  # Legacy: google_generative_ai is archived upstream and only kept for the
  # deprecated GeminiProvider. Will be removed alongside it in v0.3.0.
  google_generative_ai: ^0.4.7
  http: ^1.3.0

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.1

  # Utilities
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
